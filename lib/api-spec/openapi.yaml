openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Neighbor Weather Corrections API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: corrections
    description: Weather correction operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /corrections:
    get:
      operationId: listCorrections
      tags: [corrections]
      summary: List recent weather corrections from neighbors
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: lat
          schema:
            type: number
        - in: query
          name: lon
          schema:
            type: number
      responses:
        "200":
          description: List of corrections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Correction"
    post:
      operationId: createCorrection
      tags: [corrections]
      summary: Submit a weather correction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrectionInput"
      responses:
        "201":
          description: Created correction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Correction"
        "400":
          description: Bad request

  /corrections/summary:
    get:
      operationId: getCorrectionSummary
      tags: [corrections]
      summary: Get summary of active corrections vs official forecast
      responses:
        "200":
          description: Correction summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorrectionSummary"

  /corrections/{id}/agree:
    post:
      operationId: agreeWithCorrection
      tags: [corrections]
      summary: Agree with a neighbor correction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated correction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Correction"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Correction:
      type: object
      required: [id, actualWeatherType, officialWeatherType, createdAt, agrees]
      properties:
        id:
          type: integer
        actualWeatherType:
          type: string
          enum: [sunny, cloudy, rainy, stormy, windy, snowy, foggy]
        officialWeatherType:
          type: string
          enum: [sunny, cloudy, rainy, stormy, windy, snowy, foggy]
        description:
          type: ["string", "null"]
        locationName:
          type: ["string", "null"]
        createdAt:
          type: string
        agrees:
          type: integer

    CorrectionInput:
      type: object
      required: [actualWeatherType, officialWeatherType]
      properties:
        actualWeatherType:
          type: string
          enum: [sunny, cloudy, rainy, stormy, windy, snowy, foggy]
        officialWeatherType:
          type: string
          enum: [sunny, cloudy, rainy, stormy, windy, snowy, foggy]
        description:
          type: string
        locationName:
          type: string

    CorrectionSummary:
      type: object
      required: [totalCorrections, activeDisagreements, mostReportedActual]
      properties:
        totalCorrections:
          type: integer
        activeDisagreements:
          type: integer
        mostReportedActual:
          type: ["string", "null"]
