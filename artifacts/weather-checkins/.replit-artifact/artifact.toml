kind = "web"
previewPath = "/"
title = "Neighbor Weather Check-ins"
version = "1.0.0"
id = "artifacts/weather-checkins"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24757

[services.development]
run = "pnpm --filter @workspace/weather-checkins run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/weather-checkins", "run", "build" ]
publicDir = "artifacts/weather-checkins/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24757"
BASE_PATH = "/"
