<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff0fb"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="cShadow" x="-10%" y="-10%" width="125%" height="135%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0c4a6e" flood-opacity="0.22"/>
    </filter>
    <filter id="bGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#3b0764" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g filter="url(#cShadow)">
    <circle cx="152" cy="222" r="64"  fill="url(#cloud)"/>
    <circle cx="228" cy="178" r="82"  fill="url(#cloud)"/>
    <circle cx="322" cy="184" r="76"  fill="url(#cloud)"/>
    <circle cx="382" cy="222" r="58"  fill="url(#cloud)"/>
    <rect x="88" y="220" width="336" height="94" fill="url(#cloud)"/>
    <rect x="88" y="278" width="336" height="36" rx="18" fill="url(#cloud)"/>
  </g>
  <g filter="url(#bGlow)">
    <path
      d="M 302 248 L 260 348 L 290 348 L 242 452 L 325 334 L 290 334 Z"
      fill="url(#bolt)"
      stroke="#b45309"
      stroke-width="5"
      stroke-linejoin="round"
    />
  </g>
  <text
    x="222"
    y="256"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="128"
    fill="#7c3aed"
    filter="url(#tShadow)"
    text-anchor="middle"
    dominant-baseline="central"
  >S</text>
</svg>
