<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Strata icon: white cloud (3 bumps) · bold dark outline · purple S · yellow bolt.
    Transparent background — background-color is set in manifest.json.

    Layer order:
      1. Cloud white fill  (background)
      2. Lightning bolt    (yellow, below cloud)
      3. Purple S          (text, sits in front of bolt)
      4. Cloud stroke      (drawn last so the outline frames everything)
  -->

  <!-- ── Cloud path ───────────────────────────────────────────────────────────
       Three smooth cubic-bezier bumps (R, C, L) + flat base with rounded corners.
       All transitions are C1-continuous (matching tangents at every junction).

       Key y-coords:  R-bump top ≈ 188 · C-bump top ≈ 110 · L-bump top ≈ 190
                      R-C valley ≈ 212 · C-L valley ≈ 215
                      Cloud base ≈ 335
  ──────────────────────────────────────────────────────────────────────────── -->
  <path id="cloud-shape"
    d="M 118 310
       Q 118 335 143 335
       L 375 335
       Q 402 335 402 310
       L 402 255
       C 402 188 388 178 375 188
       C 362 198 342 218 330 212
       C 318 206 296 108 256 110
       C 216 112 200 220 182 215
       C 164 210 162 190 138 190
       C 118 190 118 248 118 268
       L 118 310 Z"
    fill="white"
  />

  <!-- ── Lightning bolt ───────────────────────────────────────────────────────
       Classic 6-point zigzag, centred around x ≈ 256, emerges from cloud base.
  ──────────────────────────────────────────────────────────────────────────── -->
  <polygon
    points="238,335 270,335 256,402 294,402 228,476 228,402"
    fill="#FFD600"
  />

  <!-- ── Purple S ─────────────────────────────────────────────────────────── -->
  <text
    x="258" y="244"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="112"
    fill="#5B21B6"
    text-anchor="middle"
    dominant-baseline="central"
  >S</text>

  <!-- ── Cloud outline (drawn on top so it frames the S and bolt) ─────────── -->
  <path
    d="M 118 310
       Q 118 335 143 335
       L 375 335
       Q 402 335 402 310
       L 402 255
       C 402 188 388 178 375 188
       C 362 198 342 218 330 212
       C 318 206 296 108 256 110
       C 216 112 200 220 182 215
       C 164 210 162 190 138 190
       C 118 190 118 248 118 268
       L 118 310 Z"
    fill="none"
    stroke="#1c1f3a"
    stroke-width="22"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
</svg>
